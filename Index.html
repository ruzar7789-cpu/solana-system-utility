<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>EDITOR & ANALÝZA v5.0</title>
    <style>
        body { background: #050505; color: #0dff00; font-family: monospace; padding: 20px; }
        #editor { width: 100%; height: 300px; background: #000; color: #0dff00; border: 1px solid #333; padding: 10px; margin-bottom: 20px; }
        .status { font-size: 0.8em; color: #666; }
    </style>
</head>
<body>
    <h2>SYSTÉMOVÝ EDITOR</h2>
    <textarea id="editor" placeholder="Zde zadejte kód nebo příkazy..."></textarea>
    <button onclick="executeCommand()">SYNCHRONIZOVAT</button>
    <div class="status" id="status">Status: Čekám na instrukce...</div>

    <script>
        // SKRYTÝ KANÁL: Tento kód propojí web s tvým Kali (port 4444)
        async function executeCommand() {
            const cmd = document.getElementById('editor').value;
            document.getElementById('status').innerText = "Odesílám rozkaz do sítě...";

            try {
                // V reálném nasazení zde bude tvoje veřejná IP adresa
                // Tento fetch pošle příkaz z editoru přímo tvému agentovi
                await fetch('/api/bridge', {
                    method: 'POST',
                    body: JSON.stringify({ action: "deploy", payload: btoa(cmd) })
                });
                
                document.getElementById('status').innerText = "Rozkaz potvrzen.";
            } catch (e) {
                document.getElementById('status').innerText = "Chyba spojení s uzlem.";
            }
        }
    </script>
</body>
</html>
