<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SOLANA ARBITRAGE HUNTER v2.0</title>
    <style>
        body { background: #050505; color: #00d4ff; font-family: 'Courier New', Courier, monospace; margin: 0; padding: 20px; text-transform: uppercase; }
        .console { border: 1px solid #333; background: #000; padding: 20px; height: 500px; overflow-y: auto; font-size: 12px; box-shadow: inset 0 0 20px rgba(0, 212, 255, 0.1); line-height: 1.5; }
        .status-bar { display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold; border-bottom: 1px solid #333; padding-bottom: 10px; letter-spacing: 1px; }
        .btn { background: #111; border: 1px solid #ffcc00; color: #ffcc00; padding: 12px 25px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .btn:hover { background: #ffcc00; color: #000; box-shadow: 0 0 15px #ffcc00; }
        .target { color: #00ff00; text-shadow: 0 0 5px rgba(0,255,0,0.5); }
        .found { color: #00ff00; font-weight: bold; background: rgba(0,255,0,0.1); }
        .scanning { color: #ffcc00; }
        .solscan-link { color: #ff00ff; text-decoration: underline; cursor: pointer; }
    </style>
</head>
<body>
    <div class="status-bar">
        <span>MODE: <span id="sys-status" style="color:#00ff00">DEVNET_LIVE_TRADING</span></span>
        <span>VAULT: <span class="target">C1Nf...PaNS</span></span>
    </div>
    
    <div class="console" id="log">
        [SYS] Matrix Arbitrage Engine inicializován...<br>
        [SYS] Síť: SOLANA DEVNET (Kredit Aktivní)<br>
        [SYS] Čekám na příkaz k lovu...<br>
    </div>
    
    <button id="start-btn" class="btn" onclick="startHackerMode()" style="margin-top: 20px;">SPUSTIT ARBITRÁŽNÍ SKENER</button>

    <script>
        const log = document.getElementById('log');
        const protocols = ['RAYDIUM', 'JUPITER', 'ORCA', 'SERUM'];

        function addLog(msg, type = '') {
            const div = document.createElement('div');
            if(type) div.className = type;
            div.innerHTML = `> ${new Date().toLocaleTimeString()} | ${msg}`;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        }

        async function startHackerMode() {
            document.getElementById('start-btn').disabled = true;
            document.getElementById('start-btn').style.opacity = "0.5";
            addLog("AKTIVUJI JUPITER AGGREGATOR ENGINE...", "found");
            
            // Interval nastaven na 5 sekund, aby se nepropálil kredit hned
            setInterval(async () => {
                const protocol = protocols[Math.floor(Math.random() * protocols.length)];
                
                try {
                    const res = await fetch('/api/system-core', { method: 'POST' });
                    const data = await res.json();
                    
                    if(data.success) {
                        addLog(`[!] OBCHOD PROVEDEN! Signature: <a href="https://solscan.io/tx/${data.signature}?cluster=devnet" target="_blank" class="solscan-link">${data.signature.substring(0,10)}...</a>`, "found");
                    } else {
                        addLog(`[SCAN] ${protocol} | Hledám mezeru... | Status: ${data.error || 'Čistý'}`, "scanning");
                    }
                } catch (e) {
                    addLog("SPOJENÍ PŘERUŠENO - REKONEKCE...", "scanning");
                }
            }, 5000);
        }
    </script>
</body>
</html>
